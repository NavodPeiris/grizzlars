name: Build & Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build_wheels:
    name: Wheels / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-14, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: pypa/cibuildwheel@v2.22
        env:
          CIBW_BUILD: "cp310-* cp311-* cp312-*"
          # Skip 32-bit builds and musl (Alpine) — C++23 toolchain too old there
          CIBW_SKIP: "*-musllinux* *-win32 *-manylinux_i686"

          # manylinux_2_28 ships GCC 12 which fully supports C++23 + std::execution
          CIBW_MANYLINUX_X86_64_IMAGE: manylinux_2_28
          CIBW_MANYLINUX_AARCH64_IMAGE: manylinux_2_28

          # TBB is required for std::execution parallel policies on GCC/Clang
          # Also ensure patchelf/unzip/zip are available in the manylinux image
          CIBW_BEFORE_ALL_LINUX: >
            dnf install -y tbb-devel patchelf unzip zip || yum install -y tbb-devel patchelf unzip zip || true
          CIBW_BEFORE_ALL_MACOS: >
            brew install tbb

          # PORTABLE_BUILD strips -march=native so the wheel runs on any
          # x86-64 or arm64 CPU, not just the specific build machine
          # Ensure created extension uses a relative rpath so auditwheel/delocate
          # can find and bundle TBB into the wheel at repair time.
          # Set both build and install rpath and let the linker embed it.
          CIBW_CMAKE_ARGS: "-DPORTABLE_BUILD=ON -DCMAKE_BUILD_RPATH='\\$ORIGIN/.libs' -DCMAKE_INSTALL_RPATH='\\$ORIGIN/.libs'"
          # Pass linker flags so the rpath is applied at link time. This helps
          # auditwheel (Linux) / delocate (macOS) detect libtbb for bundling.
          CIBW_LDFLAGS: "-Wl,-rpath,\\'\\$ORIGIN/.libs\\'"
          CIBW_BEFORE_REPAIR_LINUX: "bash .github/scripts/vendor_tbb.sh"
          CIBW_CFLAGS: "-fPIC"

          # Smoke-test every wheel before it is uploaded
          CIBW_TEST_REQUIRES: numpy
          CIBW_TEST_COMMAND: 'python -c "import grizzlars; df = grizzlars.DataFrame({''x'': [1.0, 2.0, 3.0], ''y'': [4, 5, 6]}); assert len(df) == 3; assert df.mean(''x'') == 2.0; print(''wheel OK'')"'

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  build_sdist:
    name: Source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install build
      - run: python -m build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  publish:
    name: Publish to PyPI
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # required for OIDC trusted publishing

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist/

      - uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
